<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Orange clock circle -->
  <circle cx="40" cy="30" r="20" fill="none" stroke="#F59E0B" stroke-width="5"/>
  <!-- Clock hands -->
  <line x1="40" y1="30" x2="40" y2="18" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="30" x2="49" y2="30" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  <circle cx="40" cy="30" r="1.8" fill="#F59E0B"/>
  <!-- Black key head -->
  <circle cx="18" cy="22" r="8" fill="none" stroke="#0F172A" stroke-width="4.5"/>
  <circle cx="18" cy="22" r="2" fill="#0F172A"/>
  <!-- Key shaft -->
  <line x1="18" y1="30" x2="18" y2="56" stroke="#0F172A" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Key teeth -->
  <line x1="18" y1="44" x2="26" y2="44" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
  <line x1="18" y1="50" x2="24" y2="50" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
</svg>
